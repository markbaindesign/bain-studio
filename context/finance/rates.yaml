---
name: studio_rates
description: Studio billing rates and margin thresholds for Plutus
---

# Studio Rates and Pricing Model

studio_rate_eur: 60              # EUR/hr for fixed-price project estimation
upwork_rate_usd: 65              # USD/hr for Upwork hourly contracts

minimum_margin_pct: 30           # Net margin floor before Plutus flags a proposal

# Upwork platform fee (tiered)
upwork_fees:
  - earnings_up_to: 500          # First $500 earned
    fee_pct: 20
  - earnings_up_to: 10000        # Next $9,500
    fee_pct: 10
  - earnings_above: 10000        # Above $10,000
    fee_pct: 5

# Tax rates (Spain, autónomo)
tax_rates:
  iva_pct: 21                    # IVA on B2B invoices (not charged on Upwork/international)
  irpf_pct: 15                   # IRPF retention for professional services (Spain)
